name: Scheduled DevSecOps Delta

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  discover-qlik-versions:
    name: Discover Qlik Replicate Versions
    uses: ./.github/workflows/discover-qlik-versions.yml

  devsecops:
    name: Scan for DevSecOps and Compute Delta
    needs: discover-qlik-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-qlik-versions.outputs.matrix) }}

    env:
      VERSION: ${{ matrix.version }}
      REPLICATE_URL: ${{ matrix.url }}
      BASELINE_BRANCH: security-baseline

    steps:
      - name: Checkout baseline branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ env.BASELINE_BRANCH }}
          token: ${{ secrets.BASELINE_PAT }}

      - name: Ensure baseline directory exists
        run: mkdir -p devsecops/${{ env.VERSION }}

      - name: Prepare filesystem for scan
        run: |
          set -euo pipefail

          mkdir -p /tmp/replicate /tmp/rootfs

          echo "Downloading $REPLICATE_URL"
          curl -fSL -o /tmp/replicate.tar.gz "$REPLICATE_URL"

          echo "Extracting tarball"
          tar -xzf /tmp/replicate.tar.gz -C /tmp/replicate

          echo "Locating RPM"
          RPM_FILE=$(find /tmp/replicate -maxdepth 2 -type f -name '*.rpm' | head -n 1)

          if [ -z "$RPM_FILE" ]; then
            echo "No RPM found in extracted tarball"
            exit 1
          fi

          echo "Extracting RPM payload"
          rpm2cpio "$RPM_FILE" | (cd /tmp/rootfs && cpio -idmv)

      - name: Run Trivy (filesystem)
        run: trivy fs --quiet --format json --output trivy.json /tmp/rootfs

      - name: Run Grype (filesystem)
        run: grype dir:/tmp/rootfs -o json > grype.json || true

      - name: Generate SBOM (Syft)
        run: syft dir:/tmp/rootfs -o json > sbom.json

      - name: Compute DevSecOps deltas
        run: |
          BASE="devsecops/${VERSION}"
          echo "## DevSecOps Delta for ${VERSION}" >> $GITHUB_STEP_SUMMARY

          for FILE in trivy.json grype.json sbom.json; do
            CUR="$FILE"
            PREV="$BASE/$FILE"

            echo "### ${FILE}" >> $GITHUB_STEP_SUMMARY

            if [ ! -f "$PREV" ]; then
              echo "No previous baseline — creating one." >> $GITHUB_STEP_SUMMARY
              continue
            fi

            diff -u "$PREV" "$CUR" >> $GITHUB_STEP_SUMMARY || true
          done

      - name: Update baseline
        run: |
          BASE="devsecops/${VERSION}"
          mkdir -p "$BASE"
          cp trivy.json grype.json sbom.json "$BASE"/
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$BASE"
          git commit -m "Update DevSecOps baseline for ${VERSION}" || echo "No changes"
          git push origin ${{ env.BASELINE_BRANCH }}
