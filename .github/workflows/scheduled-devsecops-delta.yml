name: Scheduled DevSecOps Delta

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  discover-qlik-versions:
    name: Discover Qlik Replicate Versions
    uses: ./.github/workflows/discover-qlik-versions.yml

  devsecops:
    name: Scan for DevSecOps and Compute Delta
    needs: discover-qlik-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-qlik-versions.outputs.matrix) }}

    env:
      RUN_DATETIME: ${{ github.event.workflow_run.created_at }}
      REPLICATE_URL: ${{ matrix.url }}
      BASELINE_BRANCH: security-baseline
      BASELINE_DIR: devsecops/${{ matrix.version }}

    steps:
      - name: Checkout baseline branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ env.BASELINE_BRANCH }}
          token: ${{ secrets.BASELINE_PAT }}

      - name: Extract Qlik
        uses: ./.github/actions/extract-qlik
        with:
          REPLICATE_URL: ${{ matrix.url }}

      - name: Run Grype (filesystem)
        run: grype dir:/tmp/rootfs -o json > grype.json || true

      - name: Generate SBOM (Syft)
        run: syft dir:/tmp/rootfs -o json > sbom.json

      - name: Compute DevSecOps deltas
        run: |
          BASELINE_DIR="${{ env.BASELINE_DIR }}"
          if [ ! -d "$BASELINE_DIR" ]; then
            echo "No previous baseline — creating one." >> $GITHUB_STEP_SUMMARY
            mkdir -p "$BASELINE_DIR"
            exit 0

          echo "## DevSecOps Delta for ${RUN_DATETIME}" >> $GITHUB_STEP_SUMMARY

          for FILE in trivy.json grype.json sbom.json; do
            PREV="$BASELINE_DIR/$FILE"
            CUR="/tmp/rootfs/$FILE"

            echo "### ${FILE}" >> $GITHUB_STEP_SUMMARY

            if [ ! -f "$PREV" ]; then
              echo "No previous baseline — creating one." >> $GITHUB_STEP_SUMMARY
              touch "$PREV"
              continue
            fi

            diff -u "$PREV" "$CUR" >> $GITHUB_STEP_SUMMARY || true
          done

      - name: Update baseline
        run: |
          cp /tmp/rootfs/trivy.json /tmp/rootfs/grype.json /tmp/rootfs/sbom.json "$BASELINE_DIR"/
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$BASELINE_DIR"
          git commit -m "Update DevSecOps baseline for ${RUN_DATETIME}" || echo "No changes"
          git push origin ${{ env.BASELINE_BRANCH }}
