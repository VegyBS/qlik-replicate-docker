name: CI

on:
  push:
    branches:
      - dev
      - '**'
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: docker/qlik-replicate/Dockerfile

      - name: Build Docker image
        run: |
          docker build -t qlik-replicate-ci ./docker/qlik-replicate

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker/docker-compose.yml up -d

      - name: Wait for service to become ready
        run: |
          echo "Waiting for Replicate endpoint..."
          for i in {1..30}; do
            if curl -s https://localhost:3562 >/dev/null; then
              echo "Service is up"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done
          echo "Service did not become ready in time"
          exit 1

      - name: Health check endpoint
        run: |
          curl -v http://localhost:3562

      - name: Save compose logs
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml logs > compose-logs.txt

      - name: Upload compose logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down environment
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml down

      - name: Save Docker image
        run: |
          docker save qlik-replicate-ci -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: built-image
          path: image.tar

  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: qlik-replicate-ci
          format: table
          exit-code: 0
          ignore-unfixed: true
