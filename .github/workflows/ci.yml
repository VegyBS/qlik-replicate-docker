name: Unified CI & Security Pipeline

on:
  push:
    branches:
      - dev
      - '**'
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:

  discover-qlik-versions:
    name: Discover Qlik Replicate Versions
    uses: ./.github/workflows/discover-qlik-versions.yml

  build-and-scan:
    name: Build, test, and security scan
    needs: discover-qlik-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-qlik-versions.outputs.matrix) }}

    env:
      COMPOSE_FILE: docker/docker-compose.yml

    steps:

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Add version info to summary
        run: |
          echo "## Qlik Replicate Versions Being Built" >> $GITHUB_STEP_SUMMARY
          echo "- **${{ matrix.version }}**" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Get build information
        run: |
          IMAGE_NAME=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'image:' | awk '{print $2}')
          CONTAINER_NAME=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'container_name:' | awk '{print $2}')
          BUILD_CONTEXT=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'context:' | awk '{print $2}')
          DOCKERFILE_RAW=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'dockerfile:' | awk '{print $2}')
          DOCKERFILE="$BUILD_CONTEXT/$DOCKERFILE_RAW"

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "CONTAINER_NAME=$CONTAINER_NAME" >> $GITHUB_ENV
          echo "BUILD_CONTEXT=$BUILD_CONTEXT" >> $GITHUB_ENV
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REPLICATE_URL=${{ matrix.url }}
            REPLICATE_VERSION=${{ matrix.version }}

      - name: Start services with Docker Compose
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d

      - name: Wait for service to become ready
        run: |
          echo "Waiting for Replicate endpoint..."
          for i in {1..30}; do
            if curl -o /dev/null -s -w "%{http_code}\n" http://localhost:3562 | grep -q "200"; then
              echo "Service is up"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done
          echo "Service did not become ready in time"
          exit 1

      - name: Save compose logs
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} logs > compose-logs.txt

      - name: Upload compose logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Extract Qlik directories
        id: extract-directories
        uses: ./.github/actions/extract-directories
        with:
          container: ${{ env.CONTAINER_NAME }}
          install_dir: "/opt/attunity/replicate"
          install_output: "out/install"
          data_dir: "/replicate/data"
          data_output: "out/data"

      - name: Vulnerability Scan install directory
        uses: ./.github/actions/scan-directory
        with:
          path: ${{ steps.extract-directories.outputs.install_output }}
          prefix: install

      - name: Vulnerability Scan data directory
        uses: ./.github/actions/scan-directory
        with:
          path: ${{ steps.extract-directories.outputs.data_output }}
          prefix: data

      - name: Tear down environment
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down

      - name: Vulnerability Scan Docker image
        uses: ./.github/actions/scan-image
        with:
          image: ${{ env.IMAGE_NAME }}

      - name: Upload vulnerability scan artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scan-results-${{ matrix.version }}
          path: |
            trivy-image.json
            grype-image.json
            sbom-image.json
            install-trivy.json
            install-grype.json
            install-sbom.json
            data-trivy.json
            data-grype.json
            data-sbom.json

  hadolint:
    needs: build-and-scan
    name: Lint Dockerfile with Hadolint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Lint Dockerfile with Hadolint
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: ${{ env.DOCKERFILE }}
          output-file: hadolint.txt

      - name: Add hadolint results to summary
        if: always()
        run: |
          {
            echo "## Hadolint Results"
            echo ""
            if [ -f hadolint.txt ] && grep -q '[^[:space:]]' hadolint.txt; then
              echo '```'
              cat hadolint.txt
              echo '```'
            else
              echo "_No Hadolint output was generated._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

   # -----------------------------
   # CI Pipeline Ends here. Delta runs for daily vulnerability scans are below.
   # -----------------------------

  deltas:
    name: Check & Update Vulnerability Deltas
    needs: [discover-qlik-versions, build-and-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-qlik-versions.outputs.matrix) }}

    env:
      VERSION: ${{ matrix.version }}
      BASELINE_BRANCH: security-baseline

    steps:
      - name: Checkout baseline branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ env.BASELINE_BRANCH }}
          token: ${{ secrets.BASELINE_PAT }}

      - name: Download scan artifacts
        uses: actions/download-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scan-results-${{ matrix.version }}

      - name: Ensure baseline directories exist
        run: mkdir -p baselines/${VERSION}

      - name: Unified delta engine
        run: |
          set -euo pipefail

          SCAN_FILES=(
            "trivy-image.json"
            "grype-image.json"
            "sbom-image.json"
            "install-trivy.json"
            "install-grype.json"
            "install-sbom.json"
            "data-trivy.json"
            "data-grype.json"
            "data-sbom.json"
          )

          for FILE in "${SCAN_FILES[@]}"; do
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Delta for ${FILE}" >> $GITHUB_STEP_SUMMARY

            CUR="${FILE}"
            PREV="baselines/${VERSION}/${FILE}"

            if [ ! -f "$PREV" ]; then
              echo "No baseline found — creating empty baseline" >> $GITHUB_STEP_SUMMARY
              touch "$PREV"
            fi

            case "$FILE" in
              *trivy*)
                JQ_FILTER='.Results[].Vulnerabilities[].VulnerabilityID'
                ;;
              *grype*)
                JQ_FILTER='.matches[].vulnerability.id'
                ;;
              *sbom*)
                JQ_FILTER='.artifacts[].id'
                ;;
            esac

            jq -r "$JQ_FILTER" "$CUR" | sort -u > current.txt || true
            jq -r "$JQ_FILTER" "$PREV" | sort -u > previous.txt || true

            comm -23 current.txt previous.txt > new.txt
            comm -13 current.txt previous.txt > resolved.txt

            echo "### New" >> $GITHUB_STEP_SUMMARY
            if [ -s new.txt ]; then
              cat new.txt >> $GITHUB_STEP_SUMMARY
              rm new.txt
            else
              echo "_None_" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Resolved" >> $GITHUB_STEP_SUMMARY
            if [ -s resolved.txt ]; then
              cat resolved.txt >> $GITHUB_STEP_SUMMARY
              rm resolved.txt
            else
              echo "_None_" >> $GITHUB_STEP_SUMMARY
            fi

            cp "$CUR" "$PREV"
          done

      - name: Commit updated vulnerability baselines
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add baselines/${VERSION}
          git commit -m "Update unified baselines for ${VERSION}" || echo "No changes"; exit 0
          git push origin ${{ env.BASELINE_BRANCH }}; echo "Pushed updated baselines for ${VERSION}"
