name: CI

on:
  push:
    branches:
      - dev
      - '**'
  pull_request:

jobs:
  discover-versions:
    name: Discover Qlik Replicate versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run version discovery script
        id: extract
        run: |
          chmod +x ./scripts/get-qlik-versions.sh

          URLS=$(./scripts/get-qlik-versions.sh | grep '^https' | sed 's/^[[:space:]]*//')

          echo "Discovered URLs:"
          echo "$URLS"

          MATRIX_ITEMS=()

          while read -r URL; do
            VERSION=$(echo "$URL" | sed -n 's#.*/v\([0-9]\+\.[0-9]\+\.[0-9]\+\)/.*#\1#p')
            MATRIX_ITEMS+=("{\"version\":\"$VERSION\",\"url\":\"$URL\"}")
          done <<< "$URLS"

          JSON=$(printf '%s\n' "${MATRIX_ITEMS[@]}" | jq -s -c .)

          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  build-test:
    name: Docker Build, test, and scan
    needs: discover-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-versions.outputs.matrix) }}

    env:
      COMPOSE_FILE: docker/docker-compose.yml
      REPLICATE_URL: ${{ matrix.url }}
      REPLICATE_VERSION: ${{ matrix.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Add version info to summary
        run: |
          echo "## Qlik Replicate Versions Being Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **${{ matrix.version }}**" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Get build information
        run: |
          IMAGE_NAME=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'image:' | awk '{print $2}')
          BUILD_CONTEXT=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'context:' | awk '{print $2}')
          DOCKERFILE_RAW=$(docker compose -f ${{ env.COMPOSE_FILE }} config | grep -m 1 'dockerfile:' | awk '{print $2}')
          DOCKERFILE="$BUILD_CONTEXT/$DOCKERFILE_RAW"

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "BUILD_CONTEXT=$BUILD_CONTEXT" >> $GITHUB_ENV
          echo "DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          tags: ${{ env.IMAGE_NAME }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REPLICATE_URL=${{ matrix.url }}

      - name: Start services with Docker Compose
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} up -d

      - name: Wait for service to become ready
        run: |
          echo "Waiting for Replicate endpoint..."
          for i in {1..30}; do
            if curl -o /dev/null -s -w "%{http_code}\n" http://localhost:3562 | grep -q "200"; then
              echo "Service is up"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done
          echo "Service did not become ready in time"
          exit 1

      - name: Save compose logs
        if: always()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} logs > compose-logs.txt

      - name: Upload compose logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down environment
        if: always()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} down

      - name: Run Trivy scan
        if: matrix.version == fromJson(needs.discover-versions.outputs.matrix)[0].version
        uses: aquasecurity/trivy-action@...
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          exit-code: 0
          ignore-unfixed: true

  hadolint:
    name: Lint Dockerfile with Hadolint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Lint Dockerfile with Hadolint
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: docker/qlik-replicate/Dockerfile
          output-file: hadolint.txt

      - name: Add hadolint results to summary
        if: always()
        run: |
          {
            echo "## Hadolint Results"
            echo ""
            if [ -f hadolint.txt ] && grep -q '[^[:space:]]' hadolint.txt; then
              echo '```'
              cat hadolint.txt
              echo '```'
            else
              echo "_No Hadolint output was generated._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
