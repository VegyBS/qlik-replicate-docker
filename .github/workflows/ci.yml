name: CI

on:
  push:
    branches:
      - dev
      - '**'
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker/docker-compose.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Lint Dockerfile with Hadolint
        id: hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: docker/qlik-replicate/Dockerfile

      - name: Add hadolint results to summary
        if: always()
        run: |
          {
            echo "## Hadolint Results"
            echo ""
            echo '```'
            cat "${{ steps.hadolint.outputs.hadolint_output }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Get container name
        run: |
          CONTAINER_NAME=$(grep -E 'container_name:' ${{ env.COMPOSE_FILE }} | awk '{print $2}')
          export QLIK_CONTAINER_NAME="$CONTAINER_NAME"

      - name: Build Docker image
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} build

      - name: Start services with Docker Compose
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} up -d

      - name: Wait for service to become ready
        run: |
          echo "Waiting for Replicate endpoint..."
          for i in {1..30}; do
            if curl -o /dev/null -s -w "%{http_code}\n" http://localhost:3562 | grep -q "200"; then
              echo "Service is up"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done
          echo "Service did not become ready in time"
          exit 1

      - name: Save compose logs
        if: always()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} logs > compose-logs.txt

      - name: Upload compose logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down environment
        if: always()
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} down

      - name: Save Docker image
        run: |
          docker save ${{ env.QLIK_CONTAINER_NAME }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: built-image
          path: image.tar

  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.QLIK_CONTAINER_NAME }}
          format: table
          exit-code: 0
          ignore-unfixed: true
