name: Discover Qlik Replicate

on:
  workflow_call:
    outputs:
      matrix:
        description: "Matrix of versions with URLs"
        value: ${{ jobs.discover.outputs.matrix }}

jobs:
  discover:
    name: Discover Qlik Replicate versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run version discovery script
        id: extract
        run: |
          chmod +x .github/scripts/get-qlik-versions.sh

          URLS=$(.github/scripts/get-qlik-versions.sh | grep '^https' | sed 's/^[[:space:]]*//')

          MATRIX_ITEMS=()

          while read -r URL; do
            VERSION=$(echo "$URL" | sed -n 's#.*/v\([0-9]\+\.[0-9]\+\.[0-9]\+\)/.*#\1#p')
            MATRIX_ITEMS+=("{\"version\":\"$VERSION\",\"url\":\"$URL\"}")
          done <<< "$URLS"

          JSON=$(printf '%s\n' "${MATRIX_ITEMS[@]}" | jq -s -c .)

          echo "matrix=$JSON" >> $GITHUB_OUTPUT

      - name: Set matrix output
        id: set-matrix
        run: echo "matrix=${{ steps.extract.outputs.matrix }}" >> $GITHUB_OUTPUT
