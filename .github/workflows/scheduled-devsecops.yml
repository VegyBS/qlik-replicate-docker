name: Scheduled DevSecOps Pipeline

on:
  schedule:
    - cron: "0 2 * * *"

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: docker/qlik-replicate/Dockerfile

      - name: Download built image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: built-image

      - name: Load Docker image
        run: |
          docker load -i image.tar

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker/docker-compose.yml up -d

      - name: Wait for service to become ready
        run: |
          echo "Waiting for Replicate endpoint..."
          for i in {1..30}; do
            if curl -s http://localhost:3562 >/dev/null; then
              echo "Service is up"
              exit 0
            fi
            echo "Still waiting..."
            sleep 5
          done
          echo "Service did not become ready in time"
          exit 1

      - name: Health check endpoint
        run: |
          curl -v http://localhost:3562

      - name: Tear down environment
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml down

  security-scan:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@d1e9f0b4b7a2d2f8c8b7e6f4a2d3c1b9e8f7d6c5
        with:
          image-ref: qlik-replicate-ci
          format: table
          exit-code: 0
          ignore-unfixed: true

      - name: Run Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: qlik-replicate-ci
          fail-build: false

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: qlik-replicate-ci
          format: json
          output-file: sbom.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-reports
          path: sbom.json
