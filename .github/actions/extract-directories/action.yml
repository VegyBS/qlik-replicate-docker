name: "Extract Qlik Directories"
description: "Extract Qlik installation and data directories from the built image"

inputs:
  version:
    required: true
    description: "Version of the software being scanned"
  container_name:
    required: true
    description: "Name of the running container to extract directories from"
  data_dir:
    required: true
    description: "Replicate Data path inside the container"
  data_output:
    required: true
    description: "Output path for the extracted data directory"
  install_dir:
    required: true
    description: "Installation directory path inside the container"
  install_output:
    required: true
    description: "Output path for the extracted installation directory"

outputs:
  install_output:
    description: "Output path for install directory"
    value: ${{ steps.set-outputs.outputs.install_output }}
  data_output:
    description: "Output path for data directory"
    value: ${{ steps.set-outputs.outputs.data_output }}

runs:
  using: "composite"
  steps:
    - name: Create output directories
      shell: bash
      run: |
        mkdir -p ${{ inputs.install_output }}-${{ inputs.version }}
        mkdir -p ${{ inputs.data_output }}-${{ inputs.version }}

    - name: Extract installation directory from running container
      shell: bash
      run: docker cp "${{ inputs.container_name }}:${{ inputs.install_dir }}" ${{ inputs.install_output }}-${{ inputs.version }} || true

    - name: Extract data directory from running container
      shell: bash
      run: docker cp "${{ inputs.container_name }}:${{ inputs.data_dir }}" ${{ inputs.data_output }}-${{ inputs.version }} || true

    - id: set-outputs
      name: Set outputs
      shell: bash
      run: |
        echo "install_output=${{ inputs.install_output }}-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        echo "data_output=${{ inputs.data_output }}-${{ inputs.version }}" >> "$GITHUB_OUTPUT"