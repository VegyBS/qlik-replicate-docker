version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10
    ignore:
    - dependency-name: "peter-evans/create-pull-request"
