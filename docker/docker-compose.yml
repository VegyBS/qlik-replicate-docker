services:

  replicate:
    image: qlik-replicate:latest
    build:
      context: ./qlik-replicate
      dockerfile: Dockerfile
      args:
        DRIVER_PROFILE: "mssql,snowflake"
        SNOWFLAKE_ODBC_VERSION: "3.17.0"
        ALLOW_ONLINE_FALLBACK: "true"
        MSSQL_VERSION: "18"
    container_name: replicate
    secrets:
      - replicate_admin_password
      - replicate_license
      - replicate_master_key
    environment:
      REPLICATEDATAFOLDER: /replicate/data
      REPLICATERESTPORT: 3562
      REPLICATEADMINPASSWORDFILE: /run/secrets/replicate_admin_password
      REPLICATELICENSEFILE: /run/secrets/replicate_license
      REPLICATEMASTERKEYFILE: /run/secrets/replicate_master_key
    ports:
      - "3562:3562"
    volumes:
       - replicate-data:/replicate/data
    healthcheck:
      test: ["CMD", "/opt/attunity/replicate/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
    entrypoint: ["/opt/attunity/replicate/bin/entrypoint.sh"]

  db2:
    image: icr.io/db2_community/db2:latest
    container_name: db2
    privileged: true
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: db2password
      DBNAME: SOURCEDB
    ports:
      - "50000:50000"
    volumes:
      - db2-data:/database
    healthcheck:
      test: ["CMD", "su", "-", "db2inst1", "-c", "db2 connect to SOURCEDB"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Enterprise"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_AGENT_ENABLED : "true"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  mssql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    entrypoint: >
      /bin/sh -c "
      /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P \"$$MSSQL_SA_PASSWORD\" -C
      -Q \"IF DB_ID('SourceDb') IS NULL CREATE DATABASE [SourceDb];\"
      "
    restart: "no"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

secrets:
  replicate_admin_password:
    file: ./secrets/replicate_admin_password.txt
  replicate_license:
    file: ./secrets/replicate_license.json
  replicate_master_key:
    file: ./secrets/replicate_master_key.txt

volumes:
  replicate-data:
  db2-data:
  kafka-data:
  mssql-data:

networks:
  default:
    name: replicate-network

